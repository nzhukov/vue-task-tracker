version: '3.8'

services:
  # Frontend - Vue 3 приложение
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-manager-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - task-network
    restart: unless-stopped

  # Backend - FastAPI сервер
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-manager-backend
    ports:
      - "8000:8000"
    volumes:
      # Том для сохранения данных
      - task-data:/app/data
      - ./backend/tasks.json:/app/data/tasks.json
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - task-network
    restart: unless-stopped

networks:
  task-network:
    driver: bridge

volumes:
  task-data:
    driver: local
